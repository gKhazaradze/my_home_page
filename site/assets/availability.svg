<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Availability calendar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f6fa"/>
      <stop offset="1" stop-color="#e7ecf3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
    <clipPath id="card">
      <rect x="120" y="110" width="1040" height="500" rx="26"/>
    </clipPath>
    <pattern id="cells" patternUnits="userSpaceOnUse" x="160" y="288" width="136" height="80">
      <rect x="0" y="0" width="120" height="64" rx="12" fill="#f7f9fc" stroke="#e8edf4" stroke-width="1.5"/>
      <rect x="12" y="11" width="24" height="8" rx="4" fill="#e1e7ef"/>
    </pattern>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- binder rings -->
  <rect x="430" y="90" width="26" height="46" rx="9" fill="#aab2c0"/>
  <rect x="824" y="90" width="26" height="46" rx="9" fill="#aab2c0"/>

  <!-- calendar card -->
  <rect x="120" y="110" width="1040" height="500" rx="26" fill="#ffffff" filter="url(#shadow)"/>

  <g clip-path="url(#card)">
    <!-- header band -->
    <rect x="120" y="110" width="1040" height="96" fill="#2563eb"/>
    <rect x="158" y="140" width="220" height="36" rx="18" fill="#ffffff" opacity="0.92"/>
    <circle cx="1066" cy="158" r="13" fill="#ffffff" opacity="0.55"/>
    <circle cx="1110" cy="158" r="13" fill="#ffffff" opacity="0.85"/>

    <!-- weekday ticks -->
    <g fill="#ccd3dd">
      <rect x="200" y="244" width="40" height="8" rx="4"/>
      <rect x="336" y="244" width="40" height="8" rx="4"/>
      <rect x="472" y="244" width="40" height="8" rx="4"/>
      <rect x="608" y="244" width="40" height="8" rx="4"/>
      <rect x="744" y="244" width="40" height="8" rx="4"/>
      <rect x="880" y="244" width="40" height="8" rx="4"/>
      <rect x="1016" y="244" width="40" height="8" rx="4"/>
    </g>

    <!-- day grid -->
    <rect x="160" y="288" width="936" height="304" fill="url(#cells)"/>

    <!-- a single ski day (accent) -->
    <rect x="296" y="288" width="120" height="64" rx="12" fill="#2563eb"/>
    <rect x="308" y="299" width="24" height="8" rx="4" fill="#ffffff" opacity="0.85"/>

    <!-- today ring -->
    <rect x="704" y="368" width="120" height="64" rx="12" fill="none" stroke="#2563eb" stroke-width="4"/>

    <!-- a free day you're on (green) -->
    <rect x="840" y="448" width="120" height="64" rx="12" fill="#10b981"/>
    <rect x="852" y="459" width="24" height="8" rx="4" fill="#ffffff" opacity="0.85"/>

    <!-- a multi-day stay bar with a seat pill -->
    <rect x="296" y="528" width="392" height="64" rx="16" fill="#f59e0b"/>
    <rect x="612" y="548" width="60" height="24" rx="12" fill="#ffffff" opacity="0.9"/>
    <circle cx="628" cy="560" r="5" fill="#f59e0b"/>
    <circle cx="646" cy="560" r="5" fill="#f59e0b"/>
  </g>

  <!-- card border on top (un-clipped so the stroke isn't halved) -->
  <rect x="120" y="110" width="1040" height="500" rx="26" fill="none" stroke="#e5e7eb" stroke-width="2"/>
</svg>
